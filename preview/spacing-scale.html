<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-app); display: flex; align-items: flex-end; gap: 12px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--grad-pulse); border-radius: 4px; }
  .num { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .px { font-family: var(--font-display); font-weight: 600; font-size: 12px; color: var(--fg-default); }
</style></head>
<body>
  <div class="col"><div class="box" style="width:4px;height:4px"></div><span class="px">4</span><span class="num">space-1</span></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><span class="px">8</span><span class="num">space-2</span></div>
  <div class="col"><div class="box" style="width:12px;height:12px"></div><span class="px">12</span><span class="num">space-3</span></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><span class="px">16</span><span class="num">space-4</span></div>
  <div class="col"><div class="box" style="width:20px;height:20px"></div><span class="px">20</span><span class="num">space-5</span></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><span class="px">24</span><span class="num">space-6</span></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><span class="px">32</span><span class="num">space-8</span></div>
  <div class="col"><div class="box" style="width:40px;height:40px"></div><span class="px">40</span><span class="num">space-10</span></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><span class="px">48</span><span class="num">space-12</span></div>
  <div class="col"><div class="box" style="width:64px;height:64px"></div><span class="px">64</span><span class="num">space-16</span></div>
  <div class="col"><div class="box" style="width:80px;height:80px"></div><span class="px">80</span><span class="num">space-20</span></div>
</body></html>
