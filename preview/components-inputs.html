<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-app); display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 12px; font-weight: 600; color: var(--fg-muted); letter-spacing: 0.01em; }
  .input, .select {
    font-family: var(--font-sans);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-default);
    background: var(--bg-surface);
    color: var(--fg-default);
    outline: none;
    transition: all var(--dur-fast) var(--ease-out);
  }
  .input:focus { border-color: var(--brand-primary); box-shadow: var(--shadow-focus); }
  .input.error { border-color: var(--status-danger); }
  .err { font-size: 11px; color: var(--status-danger); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .with-icon { position: relative; }
  .with-icon .input { padding-left: 36px; }
  .with-icon svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--fg-subtle); }
</style></head>
<body>
  <div class="row">
    <div class="field">
      <label>Buscar loja</label>
      <div class="with-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
        <input class="input" placeholder="Nome, código ou bandeira..." value="Carrefour Pinheiros">
      </div>
    </div>
    <div class="field">
      <label>Categoria</label>
      <select class="select">
        <option>Hipermercado</option><option>Atacarejo</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>SKU</label>
    <input class="input error" value="784">
    <span class="err">Código deve ter 7 dígitos · 4 faltando</span>
  </div>
</body></html>
