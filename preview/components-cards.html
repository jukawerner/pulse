<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px; background: var(--bg-app); display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; }
  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 18px;
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column; gap: 10px;
  }
  .head { display: flex; justify-content: space-between; align-items: flex-start; }
  .title { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--fg-default); }
  .sub { font-size: 12px; color: var(--fg-muted); }
  .pulse {
    background: var(--grad-pulse);
    color: white;
    border: none;
  }
  .pulse .title, .pulse .sub { color: white; }
  .pulse .sub { opacity: 0.8; }
  .metric { font-family: var(--font-display); font-weight: 700; font-size: 36px; letter-spacing: -0.025em; line-height: 1; font-variant-numeric: tabular-nums; }
  .delta { font-family: var(--font-mono); font-size: 11px; font-weight: 500; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: var(--radius-pill); background: rgba(255,255,255,0.18); font-weight: 600; }
  .pulse-line { margin-top: 4px; opacity: 0.7; }
</style></head>
<body>
  <div class="card">
    <div class="head">
      <div>
        <div class="title">Aderência de visitas</div>
        <div class="sub">Hoje · 142 de 168 lojas</div>
      </div>
      <span style="font-size:11px; padding:3px 8px; border-radius:999px; background:#D8F5E5; color:#0A6940; font-weight:600">↑ 4.2%</span>
    </div>
    <div class="metric" style="color: var(--fg-default)">84.5<span style="font-size:18px; color: var(--fg-muted)">%</span></div>
    <div class="sub">Meta semanal: 90% · faltam 9 visitas</div>
  </div>
  <div class="card pulse">
    <div class="head">
      <div>
        <div class="title">Pulse no ar</div>
        <div class="sub">Operação em tempo real</div>
      </div>
      <span class="badge">LIVE</span>
    </div>
    <div class="metric">23<span style="font-size:16px; opacity:0.75; margin-left:6px">promotores ativos</span></div>
    <svg class="pulse-line" height="22" viewBox="0 0 220 22" fill="none" preserveAspectRatio="none">
      <path d="M0 11 L50 11 L62 4 L74 18 L86 2 L98 20 L110 8 L130 11 L220 11" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
</body></html>
