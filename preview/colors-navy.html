<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 24px; background: var(--bg-app); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { height: 78px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .num { font-family: var(--font-mono); font-size: 10px; font-weight: 500; opacity: 0.85; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; font-weight: 500; opacity: 0.7; }
  .label { display:flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .label .name { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
  .label .desc { font-family: var(--font-sans); font-size: 12px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="label"><span class="name">Pulse Navy</span><span class="desc">Structure · Data · Authority · Dark theme base</span></div>
  <div class="scale">
    <div class="sw" style="background:#F2F4F9; color:#0B1426"><span class="num">50</span><span class="hex">F2F4F9</span></div>
    <div class="sw" style="background:#E2E7F1; color:#0B1426"><span class="num">100</span><span class="hex">E2E7F1</span></div>
    <div class="sw" style="background:#C2CCDF; color:#0B1426"><span class="num">200</span><span class="hex">C2CCDF</span></div>
    <div class="sw" style="background:#94A3C2; color:#0B1426"><span class="num">300</span><span class="hex">94A3C2</span></div>
    <div class="sw" style="background:#5E73A0; color:#fff"><span class="num">400</span><span class="hex">5E73A0</span></div>
    <div class="sw" style="background:#3B5187; color:#fff"><span class="num">500</span><span class="hex">3B5187</span></div>
    <div class="sw" style="background:#243C6C; color:#fff"><span class="num">600</span><span class="hex">243C6C</span></div>
    <div class="sw" style="background:#1B2A4E; color:#fff"><span class="num">700 ★</span><span class="hex">1B2A4E</span></div>
    <div class="sw" style="background:#131F3A; color:#fff"><span class="num">800</span><span class="hex">131F3A</span></div>
    <div class="sw" style="background:#0B1426; color:#fff"><span class="num">900</span><span class="hex">0B1426</span></div>
    <div class="sw" style="background:#060B17; color:#fff"><span class="num">950</span><span class="hex">060B17</span></div>
  </div>
</body></html>
