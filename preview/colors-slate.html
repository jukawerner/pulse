<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 28px 24px; background: var(--bg-app); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); gap: 0; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sw { height: 78px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .num { font-family: var(--font-mono); font-size: 10px; font-weight: 500; opacity: 0.85; }
  .hex { font-family: var(--font-mono); font-size: 9.5px; font-weight: 500; opacity: 0.7; }
  .label { display:flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .label .name { font-family: var(--font-display); font-weight: 700; font-size: 15px; }
  .label .desc { font-family: var(--font-sans); font-size: 12px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="label"><span class="name">Slate · Neutrals</span><span class="desc">80% da UI · backgrounds, borders, text</span></div>
  <div class="scale">
    <div class="sw" style="background:#FFFFFF; color:#161A24; border:1px solid #E5E8EF"><span class="num">0</span><span class="hex">FFFFFF</span></div>
    <div class="sw" style="background:#F8F9FB; color:#161A24"><span class="num">50</span><span class="hex">F8F9FB</span></div>
    <div class="sw" style="background:#F1F3F7; color:#161A24"><span class="num">100</span><span class="hex">F1F3F7</span></div>
    <div class="sw" style="background:#E5E8EF; color:#161A24"><span class="num">200</span><span class="hex">E5E8EF</span></div>
    <div class="sw" style="background:#D2D7E1; color:#161A24"><span class="num">300</span><span class="hex">D2D7E1</span></div>
    <div class="sw" style="background:#A8B0BF; color:#161A24"><span class="num">400</span><span class="hex">A8B0BF</span></div>
    <div class="sw" style="background:#7B8497; color:#fff"><span class="num">500</span><span class="hex">7B8497</span></div>
    <div class="sw" style="background:#565E70; color:#fff"><span class="num">600</span><span class="hex">565E70</span></div>
    <div class="sw" style="background:#3B4253; color:#fff"><span class="num">700</span><span class="hex">3B4253</span></div>
    <div class="sw" style="background:#242937; color:#fff"><span class="num">800</span><span class="hex">242937</span></div>
    <div class="sw" style="background:#161A24; color:#fff"><span class="num">900</span><span class="hex">161A24</span></div>
  </div>
</body></html>
