<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-app); display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; place-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .shape {
    width: 72px; height: 72px;
    background: var(--grad-pulse);
    box-shadow: var(--shadow-sm);
  }
  .px { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--fg-default); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style></head>
<body>
  <div class="item"><div class="shape" style="border-radius:4px"></div><span class="px">4px</span><span class="name">radius-xs</span></div>
  <div class="item"><div class="shape" style="border-radius:6px"></div><span class="px">6px</span><span class="name">radius-sm</span></div>
  <div class="item"><div class="shape" style="border-radius:10px"></div><span class="px">10px ★</span><span class="name">radius-md</span></div>
  <div class="item"><div class="shape" style="border-radius:14px"></div><span class="px">14px</span><span class="name">radius-lg</span></div>
  <div class="item"><div class="shape" style="border-radius:20px"></div><span class="px">20px</span><span class="name">radius-xl</span></div>
  <div class="item"><div class="shape" style="border-radius:999px"></div><span class="px">pill</span><span class="name">radius-pill</span></div>
</body></html>
