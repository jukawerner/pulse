<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg-app); }
  .row { display: grid; grid-template-columns: 76px 1fr 110px; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px dashed var(--border-subtle); }
  .row:last-child { border: none; }
  .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 700; color: var(--brand-primary); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); text-align: right; }
</style></head>
<body>
  <div class="row"><span class="tag">Display</span><span class="t-display-md">A realidade da operação</span><span class="meta">48 / 800 / Space Grotesk</span></div>
  <div class="row"><span class="tag">H1</span><span class="t-h1">Dashboard de hoje</span><span class="meta">38 / 700</span></div>
  <div class="row"><span class="tag">H2</span><span class="t-h2">Lojas em rota</span><span class="meta">30 / 700</span></div>
  <div class="row"><span class="tag">H3</span><span class="t-h3">Estoque por SKU</span><span class="meta">24 / 700</span></div>
  <div class="row"><span class="tag">H4</span><span class="t-h4">Atividades pendentes</span><span class="meta">20 / 600</span></div>
</body></html>
