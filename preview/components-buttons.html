<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--bg-app); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: var(--radius-md);
    border: 1px solid transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all var(--dur-fast) var(--ease-out);
  }
  .primary { background: var(--brand-primary); color: white; }
  .primary:hover { background: var(--brand-primary-hover); }
  .secondary { background: var(--brand-secondary); color: white; }
  .ghost { background: transparent; color: var(--fg-default); border-color: var(--border-default); }
  .ghost:hover { background: var(--bg-surface-2); }
  .danger-ghost { background: transparent; color: var(--status-danger); border-color: var(--status-danger); }
  .link { background: transparent; color: var(--brand-primary); border: none; padding: 10px 4px; }
  .sm { padding: 6px 12px; font-size: 13px; border-radius: var(--radius-sm); }
  .lg { padding: 14px 22px; font-size: 16px; border-radius: var(--radius-md); }
  .icon { width: 16px; height: 16px; stroke-width: 2; }
</style></head>
<body>
  <div class="row">
    <button class="btn primary">Bater ponto<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12l5 5L20 7" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button class="btn secondary">Ver lojas</button>
    <button class="btn ghost">Cancelar</button>
    <button class="btn danger-ghost">Excluir</button>
    <button class="btn link">Saiba mais →</button>
  </div>
  <div class="row">
    <button class="btn primary sm">Pequeno</button>
    <button class="btn primary">Médio</button>
    <button class="btn primary lg">Grande</button>
    <button class="btn primary" disabled style="opacity:0.5; cursor:not-allowed">Desabilitado</button>
  </div>
</body></html>
