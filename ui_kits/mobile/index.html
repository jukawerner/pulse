<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pulse Mobile · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<style>
  /* ============ STAGE ============ */
  body {
    background:
      radial-gradient(ellipse 1200px 700px at 20% 0%, rgba(200,16,46,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 900px 600px at 90% 100%, rgba(27,42,78,0.55) 0%, transparent 65%),
      #060B17;
    min-height: 100vh;
    padding: 56px 24px 80px;
    color: #ECEFF6;
  }
  .stage-head { max-width: 1280px; margin: 0 auto 40px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .stage-head h1 {
    font-family: var(--font-display); font-weight: 800; font-size: 38px;
    letter-spacing: -0.03em; margin: 0 0 6px; color: #ECEFF6;
  }
  .stage-head h1 span {
    background: linear-gradient(135deg, #F75A66, #94A3C2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .stage-head p { color: #A8B0BF; font-size: 15px; max-width: 520px; margin: 0; line-height: 1.55; }
  .stage-head .meta { font-family: var(--font-mono); font-size: 12px; color: #7B8497; letter-spacing: 0.06em; }
  .stage-head .back { display: inline-flex; align-items: center; gap: 6px; color: #A8B0BF; text-decoration: none; font-size: 13px; font-weight: 500; margin-bottom: 16px; }
  .stage-head .back:hover { color: #ECEFF6; }

  .stage {
    max-width: 1480px; margin: 0 auto;
    display: flex; flex-direction: column; gap: 24px;
    padding: 0 4px 40px;
  }
  .stage-row-head {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 8px 4px;
    font-family: var(--font-display); font-weight: 700; font-size: 18px;
    color: #ECEFF6; letter-spacing: -0.01em;
  }
  .stage-row-head .count { font-family: var(--font-mono); font-size: 11px; color: #7B8497; font-weight: 500; letter-spacing: 0.06em; margin-left: auto; }
  .stage-row-head .badge {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    padding: 4px 10px; border-radius: 999px;
    letter-spacing: 0.14em; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .stage-row-head .badge::before { content:''; width: 7px; height: 7px; border-radius: 50%; }
  .stage-row-head .badge.light { background: rgba(255,255,255,0.95); color: #0B1426; }
  .stage-row-head .badge.light::before { background: #FCFCFD; box-shadow: 0 0 0 2px rgba(255,255,255,0.4); }
  .stage-row-head .badge.dark { background: rgba(15,23,41,0.7); color: #ECEFF6; border: 1px solid rgba(255,255,255,0.12); }
  .stage-row-head .badge.dark::before { background: #94A3C2; }
  .stage-row {
    display: flex; gap: 36px;
    overflow-x: auto;
    padding: 8px 4px 28px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .stage-row::-webkit-scrollbar { height: 8px; }
  .stage-row::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  .stage-row.dark { background: linear-gradient(180deg, rgba(11,20,38,0.4) 0%, transparent 100%); border-radius: 24px; padding: 28px 12px; }

  .screen-wrap { display: flex; flex-direction: column; gap: 12px; align-items: center; flex-shrink: 0; }
  .screen-num {
    font-family: var(--font-mono); font-size: 11px; color: #7B8497;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .screen-label {
    font-family: var(--font-display); font-weight: 700; font-size: 15px;
    color: #ECEFF6; letter-spacing: -0.01em;
  }

  /* ============ DEVICE ============ */
  .phone {
    width: 360px; height: 740px;
    background: var(--bg-app);
    border-radius: 50px;
    border: 12px solid #0A0E18;
    box-shadow:
      0 0 0 2px rgba(255,255,255,0.04) inset,
      0 40px 80px -20px rgba(0,0,0,0.7),
      0 16px 40px -10px rgba(200,16,46,0.15);
    overflow: hidden;
    position: relative;
    display: flex; flex-direction: column;
  }
  .phone[data-theme="dark"] {
    /* backgrounds */
    --bg-app:        #060B17;
    --bg-surface:    #0F1729;
    --bg-surface-2:  #1A2540;
    --bg-surface-3:  #243056;

    /* foregrounds */
    --fg-default:    #ECEFF6;
    --fg-muted:      #A8B0BF;
    --fg-subtle:     #7B8497;
    --fg-disabled:   #4A5263;

    /* borders */
    --border-subtle:  rgba(255,255,255,0.07);
    --border-default: rgba(255,255,255,0.12);
    --border-strong:  rgba(255,255,255,0.2);

    /* brand (slightly brighter on dark) */
    --brand-primary:       #F75A66;
    --brand-primary-hover: #FF7782;
    --brand-primary-soft:  rgba(247,90,102,0.16);

    --brand-secondary:      #94A3C2;
    --brand-secondary-soft: rgba(94,115,160,0.18);

    /* status */
    --status-success:      #2DCE85;
    --status-success-soft: rgba(45,206,133,0.14);
    --status-warning:      #F5B547;
    --status-warning-soft: rgba(245,181,71,0.14);
    --status-danger:       #F75A66;
    --status-danger-soft:  rgba(247,90,102,0.16);

    /* gradient — keeps the brand red but with deeper navy tail */
    --grad-pulse: linear-gradient(135deg, #E63946 0%, #C8102E 35%, #1B2A4E 100%);

    /* shadows */
    --shadow-xs: 0 1px 2px rgba(0,0,0,0.4);
    --shadow-sm: 0 2px 4px rgba(0,0,0,0.4);
  }
  .phone[data-theme="dark"] .icon-btn { color: var(--fg-default); }
  .phone[data-theme="dark"] .stat,
  .phone[data-theme="dark"] .visit,
  .phone[data-theme="dark"] .menu-item,
  .phone[data-theme="dark"] .perf-card,
  .phone[data-theme="dark"] .findings,
  .phone[data-theme="dark"] .count-card,
  .phone[data-theme="dark"] .ach,
  .phone[data-theme="dark"] .prev-c {
    background: var(--bg-surface);
    border-color: var(--border-subtle);
  }
  .phone[data-theme="dark"] .v-num,
  .phone[data-theme="dark"] .menu-ic,
  .phone[data-theme="dark"] .cbtn,
  .phone[data-theme="dark"] .bar:not(.active) { background: var(--bg-surface-2); }
  .phone[data-theme="dark"] .tabbar { background: var(--bg-surface); border-top-color: var(--border-subtle); }
  .phone[data-theme="dark"] .fab .fab-btn { box-shadow: 0 10px 22px rgba(247,90,102,0.45), 0 0 0 6px var(--bg-surface); }
  .phone[data-theme="dark"] .punch-btn { color: #C8102E; }
  .phone[data-theme="dark"] .hero,
  .phone[data-theme="dark"] .prof-hero {
    box-shadow: 0 14px 30px -10px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  }
  .notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 110px; height: 30px; background: #0A0E18;
    border-radius: 16px; z-index: 30;
  }
  .home-ind {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 4px; background: rgba(255,255,255,0.35);
    border-radius: 2px; z-index: 30;
  }
  .phone[data-theme="light"] .home-ind { background: rgba(0,0,0,0.25); }

  .status {
    padding: 14px 28px 4px; height: 44px;
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-display); font-size: 14px; font-weight: 600;
    color: var(--fg-default);
    flex-shrink: 0;
  }
  .status .right { display: flex; gap: 5px; align-items: center; }
  .status svg { width: 14px; height: 14px; }

  /* ============ SCREEN BASE ============ */
  .scr {
    flex: 1; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 6px 18px 24px;
    display: flex; flex-direction: column; gap: 14px;
    color: var(--fg-default);
  }
  .scr::-webkit-scrollbar { display: none; }

  /* ============ HEADER ============ */
  .hdr { display: flex; align-items: center; gap: 12px; padding: 6px 2px 2px; }
  .av {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--grad-pulse); color: white;
    display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 700; font-size: 15px;
    flex-shrink: 0; position: relative;
    box-shadow: 0 4px 10px rgba(200,16,46,0.3);
  }
  .av::after {
    content:''; position:absolute; bottom: 0; right: 0;
    width: 11px; height: 11px; background: #16A66B;
    border-radius: 50%; border: 2px solid var(--bg-app);
  }
  .hi-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
  .hi-sub { font-size: 11px; color: var(--fg-muted); margin-top: 2px; font-family: var(--font-mono); }

  .icon-btn {
    width: 38px; height: 38px; border-radius: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    display: grid; place-items: center;
    color: var(--fg-default); cursor: pointer;
    flex-shrink: 0; position: relative;
  }
  .icon-btn svg { width: 17px; height: 17px; }
  .icon-btn .dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: var(--brand-primary); border-radius: 50%; border: 2px solid var(--bg-surface); }

  /* ============ HERO CARD ============ */
  .hero {
    background: var(--grad-pulse);
    color: white;
    border-radius: 22px;
    padding: 18px 20px 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 14px 30px -10px rgba(200,16,46,0.5);
  }
  .hero::before {
    content: ''; position: absolute; right: -40px; top: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-tag {
    font-family: var(--font-mono); font-size: 10px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase;
    opacity: 0.92; display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.16); padding: 4px 10px; border-radius: 999px;
  }
  .hero-tag svg { width: 10px; height: 10px; }
  .hero-title { font-family: var(--font-display); font-size: 24px; font-weight: 700; letter-spacing: -0.025em; margin: 10px 0 4px; line-height: 1.1; position: relative; }
  .hero-addr { font-size: 12px; opacity: 0.88; margin-bottom: 14px; position: relative; }
  .hero-meta {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.18);
    position: relative;
  }
  .hero-meta-item .v { font-family: var(--font-display); font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .hero-meta-item .l { font-size: 10px; opacity: 0.78; margin-top: 1px; line-height: 1.2; }
  .punch-btn {
    margin-top: 14px; width: 100%;
    background: white; color: var(--red-700);
    padding: 13px; border-radius: 14px;
    font-family: var(--font-sans); font-size: 14px; font-weight: 700;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  }
  .punch-btn svg { width: 16px; height: 16px; }

  /* ============ STATS ============ */
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 14px; padding: 12px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-l { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-muted); font-weight: 600; }
  .stat-v { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -0.025em; font-variant-numeric: tabular-nums; line-height: 1; }
  .stat-d { font-size: 10px; color: var(--status-success); font-family: var(--font-mono); display: flex; align-items: center; gap: 3px; }
  .stat-d.warn { color: var(--status-warning); }
  .stat-d svg { width: 10px; height: 10px; }

  /* ============ SECTION ============ */
  .sect-head { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 2px 0; }
  .sect-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .sect-link { font-size: 11px; color: var(--brand-primary); font-weight: 600; cursor: pointer; }

  /* ============ VISIT LIST ============ */
  .visits { display: flex; flex-direction: column; gap: 8px; }
  .visit {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 14px; padding: 12px;
    display: flex; gap: 12px; align-items: center;
    position: relative;
  }
  .v-num {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--bg-surface-2);
    display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 700; font-size: 12px;
    color: var(--fg-muted); flex-shrink: 0;
  }
  .v-info { flex: 1; min-width: 0; }
  .v-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .v-meta { font-size: 10px; color: var(--fg-muted); font-family: var(--font-mono); margin-top: 2px; display: flex; gap: 6px; align-items: center; }
  .v-meta .sep { opacity: 0.4; }
  .v-time {
    font-size: 10px; font-family: var(--font-mono); font-weight: 700;
    padding: 4px 8px; border-radius: 7px;
    background: var(--bg-surface-2); color: var(--fg-default);
  }
  .visit.active {
    background: var(--grad-pulse); color: white;
    border-color: transparent;
    box-shadow: 0 8px 18px -4px rgba(200,16,46,0.4);
  }
  .visit.active .v-num { background: rgba(255,255,255,0.2); color: white; }
  .visit.active .v-meta { color: rgba(255,255,255,0.85); }
  .visit.active .v-time { background: rgba(255,255,255,0.22); color: white; }
  .visit.done .v-num { background: var(--status-success); color: white; }
  .visit.done .v-name { opacity: 0.7; }
  .visit.done .v-meta { opacity: 0.6; }

  /* ============ TAB BAR ============ */
  .tabbar {
    height: 78px;
    background: var(--bg-surface);
    border-top: 1px solid var(--border-subtle);
    padding: 8px 4px 22px;
    display: grid; grid-template-columns: repeat(5, 1fr);
    flex-shrink: 0;
    position: relative;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; color: var(--fg-subtle); font-size: 9px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.02em;
  }
  .tab-item svg { width: 21px; height: 21px; }
  .tab-item.active { color: var(--brand-primary); }
  .tab-item.active::before {
    content: ''; position: absolute; top: 0; width: 28px; height: 3px;
    background: var(--brand-primary); border-radius: 0 0 3px 3px;
  }
  .fab { position: relative; }
  .fab .fab-btn {
    position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
    width: 54px; height: 54px; border-radius: 50%;
    background: var(--grad-pulse);
    display: grid; place-items: center; color: white;
    box-shadow: 0 10px 22px rgba(200,16,46,0.5), 0 0 0 6px var(--bg-surface);
  }
  .fab .fab-btn svg { width: 22px; height: 22px; }
  .fab .label { margin-top: 32px; }

  /* ============ MAP ============ */
  .map-canvas {
    height: 280px; border-radius: 18px;
    background:
      linear-gradient(135deg, rgba(27,42,78,0.7), rgba(11,20,38,0.9)),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 32px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 32px),
      #1B2A4E;
    position: relative; overflow: hidden;
    border: 1px solid var(--border-subtle);
  }
  .map-route {
    position: absolute; inset: 0;
  }
  .map-pin {
    position: absolute; width: 28px; height: 28px; border-radius: 50%;
    display: grid; place-items: center;
    color: white; font-family: var(--font-display); font-weight: 700; font-size: 11px;
    border: 2px solid white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
  }
  .map-pin.done { background: #16A66B; }
  .map-pin.active { background: var(--brand-primary); width: 36px; height: 36px; font-size: 13px; box-shadow: 0 0 0 6px rgba(200,16,46,0.25), 0 4px 10px rgba(0,0,0,0.4); }
  .map-pin.next { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.6); backdrop-filter: blur(4px); }
  .map-card {
    position: absolute; left: 12px; right: 12px; bottom: 12px;
    background: rgba(15,23,41,0.9); backdrop-filter: blur(12px);
    border-radius: 14px; padding: 12px;
    display: flex; gap: 10px; align-items: center;
    border: 1px solid rgba(255,255,255,0.08);
    color: white;
  }
  .map-card .ic { width: 36px; height: 36px; border-radius: 10px; background: var(--brand-primary); display: grid; place-items: center; flex-shrink: 0; }
  .map-card .ic svg { width: 18px; height: 18px; color: white; }
  .map-card .name { font-family: var(--font-display); font-size: 13px; font-weight: 700; }
  .map-card .dist { font-size: 10px; color: rgba(255,255,255,0.65); font-family: var(--font-mono); margin-top: 2px; }
  .map-card .go { margin-left: auto; width: 32px; height: 32px; border-radius: 50%; background: white; color: var(--red-700); display: grid; place-items: center; }

  /* ============ SCAN ============ */
  .scan-card {
    background: linear-gradient(160deg, #131F3A 0%, #0B1426 100%);
    color: white;
    border-radius: 20px; padding: 16px;
    overflow: hidden;
  }
  .scan-frame {
    margin-top: 14px; height: 180px; border-radius: 12px;
    background:
      linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0)),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.18) 0 2px, transparent 2px 5px);
    position: relative; overflow: hidden;
  }
  .scan-corners { position: absolute; inset: 14px; }
  .scan-corners > i {
    position: absolute; width: 22px; height: 22px;
    border: 3px solid var(--brand-primary); border-radius: 3px;
  }
  .scan-corners > i:nth-child(1) { top: 0; left: 0; border-right: 0; border-bottom: 0; }
  .scan-corners > i:nth-child(2) { top: 0; right: 0; border-left: 0; border-bottom: 0; }
  .scan-corners > i:nth-child(3) { bottom: 0; left: 0; border-right: 0; border-top: 0; }
  .scan-corners > i:nth-child(4) { bottom: 0; right: 0; border-left: 0; border-top: 0; }
  .scan-line {
    position: absolute; left: 14px; right: 14px; top: 50%;
    height: 2px; background: var(--brand-primary);
    box-shadow: 0 0 14px var(--brand-primary), 0 0 28px var(--brand-primary);
    animation: scanmove 2.4s ease-in-out infinite;
  }
  @keyframes scanmove {
    0%, 100% { top: 18%; } 50% { top: 82%; }
  }
  .sku-tag {
    display: inline-flex; gap: 6px; align-items: center;
    font-family: var(--font-mono); font-size: 10px;
    background: rgba(255,255,255,0.14); padding: 4px 8px; border-radius: 6px;
    margin-top: 10px;
  }
  .pulse-mini { font-size: 9px; font-family: var(--font-mono); color: #FF9BA3; font-weight: 700; letter-spacing: 0.18em; }

  .count-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    border-radius: 16px; padding: 18px;
  }
  .count-h { font-family: var(--font-display); font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  .count-sub { font-size: 11px; color: var(--fg-muted); margin-top: 2px; font-family: var(--font-mono); }
  .counter { display: flex; align-items: center; gap: 18px; margin-top: 16px; justify-content: center; }
  .cbtn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg-surface-2); display: grid; place-items: center;
    color: var(--fg-default); font-size: 22px; font-weight: 600;
    cursor: pointer; border: none; font-family: inherit;
    border: 1px solid var(--border-subtle);
  }
  .ccount {
    font-family: var(--font-display); font-weight: 700;
    font-size: 44px; letter-spacing: -0.025em; font-variant-numeric: tabular-nums;
    min-width: 80px; text-align: center; line-height: 1;
  }
  .save-btn {
    margin-top: 18px; width: 100%;
    background: var(--brand-primary); color: white;
